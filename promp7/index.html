<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>趣味英语乐园 - 早教儿童英语</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* 主菜单 */
        .menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        .logo {
            font-size: 3em;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.2em;
            margin-bottom: 40px;
        }

        .menu-btn {
            width: 80%;
            padding: 20px;
            margin: 10px 0;
            border: none;
            border-radius: 25px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .menu-btn:active {
            transform: scale(0.95);
        }

        .menu-btn.game {
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .menu-btn.learn {
            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .menu-btn.exam {
            background: linear-gradient(45deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        .menu-btn.progress {
            background: linear-gradient(45deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        /* 情景选择 */
        .category-screen, .game-screen, .learn-screen, .exam-screen, .progress-screen {
            display: none;
            height: 100%;
            animation: fadeIn 0.3s ease;
        }

        .category-screen.active, .game-screen.active, .learn-screen.active, .exam-screen.active, .progress-screen.active {
            display: flex;
            flex-direction: column;
        }

        .screen-header {
            padding: 15px;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.1);
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
        }

        .screen-title {
            flex: 1;
            text-align: center;
            color: white;
            font-size: 1.3em;
            font-weight: bold;
        }

        .category-grid {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            overflow-y: auto;
        }

        .category-card {
            background: white;
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .category-card:active {
            transform: scale(0.95);
        }

        .category-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .category-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
        }

        .category-count {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        /* 游戏界面 */
        .game-canvas {
            flex: 1;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 100%);
            position: relative;
            overflow: hidden;
        }

        .game-info-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.1);
            z-index: 10;
        }

        .score-display, .combo-display {
            background: rgba(255,255,255,0.9);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .score-display {
            color: #f5576c;
        }

        .combo-display {
            color: #43e97b;
        }

        .falling-item {
            position: absolute;
            width: 70px;
            height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: none;
        }

        .falling-emoji {
            font-size: 3em;
        }

        .falling-word {
            font-size: 0.7em;
            font-weight: bold;
            color: #333;
            background: rgba(255,255,255,0.8);
            padding: 3px 8px;
            border-radius: 10px;
            margin-top: 5px;
        }

        .cart {
            position: absolute;
            bottom: 20px;
            width: 100px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: left 0.1s linear;
        }

        .cart-emoji {
            font-size: 3.5em;
        }

        /* 游戏控制区域 */
        .game-controls {
            padding: 20px;
            background: rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .control-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 2em;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .control-btn:active {
            transform: scale(0.9);
        }

        /* 学习模式 */
        .learn-container {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
        }

        .flashcard {
            width: 90%;
            max-width: 350px;
            background: white;
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .flashcard-emoji {
            font-size: 8em;
            margin-bottom: 20px;
        }

        .flashcard-en {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .flashcard-zh {
            font-size: 1.5em;
            color: #666;
            margin-bottom: 20px;
        }

        .speak-btn {
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.2em;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .learn-nav {
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 350px;
            margin-top: 20px;
        }

        .nav-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            background: rgba(255,255,255,0.9);
            color: #333;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .card-indicator {
            text-align: center;
            color: white;
            margin-top: 15px;
            font-size: 1.1em;
        }

        /* 考试模式 */
        .exam-container {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #43e97b 0%, #38f9d7 100%);
        }

        .exam-card {
            width: 90%;
            max-width: 350px;
            background: white;
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .exam-emoji {
            font-size: 8em;
            margin-bottom: 20px;
        }

        .timer {
            font-size: 3em;
            font-weight: bold;
            color: #f5576c;
            margin-bottom: 20px;
        }

        .exam-status {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
        }

        .record-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: 2.5em;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .record-btn:active {
            transform: scale(0.9);
        }

        .record-btn.recording {
            background: linear-gradient(45deg, #ff416c 0%, #ff4b2b 100%);
            animation: pulse 1s infinite;
        }

        .result-display {
            font-size: 2em;
            font-weight: bold;
            margin-top: 20px;
        }

        .result-display.correct {
            color: #43e97b;
        }

        .result-display.wrong {
            color: #f5576c;
        }

        /* 进度页面 */
        .progress-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: linear-gradient(180deg, #fa709a 0%, #fee140 100%);
        }

        .progress-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .progress-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 20px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(45deg, #43e97b 0%, #38f9d7 100%);
            transition: width 0.5s ease;
        }

        .progress-numbers {
            color: #666;
            font-size: 0.9em;
        }

        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .word-tag {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 0.9em;
        }

        .word-tag.learned {
            background: #d4edda;
            color: #155724;
        }

        .word-tag.learning {
            background: #fff3cd;
            color: #856404;
        }

        /* 游戏结束弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            max-width: 80%;
            animation: popIn 0.3s ease;
        }

        .modal-title {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .modal-score {
            font-size: 3em;
            font-weight: bold;
            color: #f5576c;
            margin-bottom: 10px;
        }

        .modal-subtext {
            color: #666;
            margin-bottom: 30px;
        }

        .modal-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
        }

        .modal-btn.primary {
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .modal-btn.secondary {
            background: #eee;
            color: #333;
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .catch-effect {
            position: absolute;
            font-size: 2em;
            animation: catchAnim 0.5s ease forwards;
            pointer-events: none;
        }

        @keyframes catchAnim {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(2) translateY(-50px); }
        }

        /* 连击特效 */
        .combo-effect {
            position: absolute;
            font-size: 3em;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: comboAnim 1s ease forwards;
            pointer-events: none;
            z-index: 20;
        }

        @keyframes comboAnim {
            0% { opacity: 1; transform: scale(0.5) translateY(0); }
            50% { transform: scale(1.2) translateY(-30px); }
            100% { opacity: 0; transform: scale(1) translateY(-60px); }
        }

        /* 隐藏屏幕 */
        .hidden {
            display: none !important;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            color: rgba(255,255,255,0.8);
            padding: 40px;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        /* 开始游戏按钮 */
        .start-game-btn {
            width: 100%;
            padding: 20px;
            margin-top: 10px;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
        }

        /* 游戏提示 */
        .game-tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 20px 30px;
            border-radius: 20px;
            font-size: 1.2em;
            text-align: center;
            z-index: 15;
            display: none;
        }

        .game-tip.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 主菜单 -->
        <div id="menuScreen" class="menu-screen">
            <div class="logo">🎈 趣味英语乐园</div>
            <div class="subtitle">让孩子快乐学英语</div>
            <button class="menu-btn game" onclick="showCategorySelect('game')">🎮 游戏模式</button>
            <button class="menu-btn learn" onclick="showCategorySelect('learn')">📚 学习模式</button>
            <button class="menu-btn exam" onclick="showCategorySelect('exam')">🎤 考试模式</button>
            <button class="menu-btn progress" onclick="showProgress()">📊 学习进度</button>
        </div>

        <!-- 情景选择 -->
        <div id="categoryScreen" class="category-screen">
            <div class="screen-header">
                <button class="back-btn" onclick="backToMenu()">← 返回</button>
                <div class="screen-title" id="categoryTitle">选择情景</div>
                <div style="width: 80px;"></div>
            </div>
            <div class="category-grid" id="categoryGrid"></div>
            <div style="padding: 20px;">
                <button id="startGameBtn" class="start-game-btn hidden" onclick="startGame()">开始游戏 🚀</button>
            </div>
        </div>

        <!-- 游戏界面 -->
        <div id="gameScreen" class="game-screen">
            <div class="game-canvas" id="gameCanvas">
                <div class="game-info-bar">
                    <div class="score-display">分数: <span id="score">0</span></div>
                    <div class="combo-display">连击: <span id="combo">0</span></div>
                </div>
                <div class="game-tip" id="gameTip">准备好了吗？点击下方按钮开始！</div>
                <div class="cart" id="cart">
                    <div class="cart-emoji">🛒</div>
                </div>
            </div>
            <div class="game-controls">
                <button class="control-btn" id="leftBtn">←</button>
                <button class="control-btn" id="rightBtn">→</button>
            </div>
        </div>

        <!-- 学习界面 -->
        <div id="learnScreen" class="learn-screen">
            <div class="screen-header">
                <button class="back-btn" onclick="backToCategory()">← 返回</button>
                <div class="screen-title">学习模式</div>
                <div style="width: 80px;"></div>
            </div>
            <div class="learn-container">
                <div class="flashcard">
                    <div class="flashcard-emoji" id="learnEmoji">🍎</div>
                    <div class="flashcard-en" id="learnEn">Apple</div>
                    <div class="flashcard-zh" id="learnZh">苹果</div>
                    <button class="speak-btn" onclick="speakCurrentWord()">🔊 朗读</button>
                </div>
                <div class="learn-nav">
                    <button class="nav-btn" id="prevBtn" onclick="prevWord()">← 上一个</button>
                    <button class="nav-btn" id="nextBtn" onclick="nextWord()">下一个 →</button>
                </div>
                <div class="card-indicator" id="cardIndicator">1 / 10</div>
            </div>
        </div>

        <!-- 考试界面 -->
        <div id="examScreen" class="exam-screen">
            <div class="screen-header">
                <button class="back-btn" onclick="backToCategory()">← 返回</button>
                <div class="screen-title">考试模式</div>
                <div style="width: 80px;"></div>
            </div>
            <div class="exam-container">
                <div class="exam-card">
                    <div class="exam-emoji" id="examEmoji">🍎</div>
                    <div class="timer" id="examTimer">5</div>
                    <div class="exam-status" id="examStatus">看着图片，说出这个单词！</div>
                    <button class="record-btn" id="recordBtn" onclick="toggleRecording()">🎤</button>
                    <div class="result-display" id="resultDisplay"></div>
                </div>
                <div class="card-indicator" id="examIndicator">1 / 10</div>
            </div>
        </div>

        <!-- 进度界面 -->
        <div id="progressScreen" class="progress-screen">
            <div class="screen-header">
                <button class="back-btn" onclick="backToMenu()">← 返回</button>
                <div class="screen-title">学习进度</div>
                <div style="width: 80px;"></div>
            </div>
            <div class="progress-container" id="progressContainer">
                <!-- 进度内容将动态生成 -->
            </div>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="modal-overlay" id="gameOverModal">
        <div class="modal">
            <div class="modal-title">🎉 游戏结束</div>
            <div class="modal-score" id="finalScore">0</div>
            <div class="modal-subtext">最高连击: <span id="maxCombo">0</span></div>
            <div class="modal-btns">
                <button class="modal-btn secondary" onclick="closeModal()">返回菜单</button>
                <button class="modal-btn primary" onclick="restartGame()">再玩一次</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 单词数据库 ====================
        const wordDatabase = {
            fruits: {
                name: '水果类',
                icon: '🍎',
                words: [
                    { en: 'Apple', zh: '苹果', emoji: '🍎' },

                    { en: 'Watermelon', zh: '西瓜', emoji: '🍉' },
                    { en: 'Strawberry', zh: '草莓', emoji: '🍓' },
                    { en: 'Peach', zh: '桃子', emoji: '🍑' },
                    { en: 'Pear', zh: '梨', emoji: '🍐' },
                    { en: 'Pineapple', zh: '菠萝', emoji: '🍍' },
                    { en: 'Mango', zh: '芒果', emoji: '🥭' },
                    { en: 'Cherry', zh: '樱桃', emoji: '🍒' },

            },
            animals: {
                name: '动物类',
                icon: '🐶',
                words: [
                    { en: 'Dog', zh: '狗', emoji: '🐶' },
                    { en: 'Cat', zh: '猫', emoji: '🐱' },
                    { en: 'Bird', zh: '鸟', emoji: '🐦' },
                    { en: 'Fish', zh: '鱼', emoji: '🐟' },
                    { en: 'Rabbit', zh: '兔子', emoji: '🐰' },
                    { en: 'Monkey', zh: '猴子', emoji: '🐵' },
                    { en: 'Tiger', zh: '老虎', emoji: '🐯' },
                    { en: 'Lion', zh: '狮子', emoji: '🦁' },
                    { en: 'Elephant', zh: '大象', emoji: '🐘' },
                    { en: 'Bear', zh: '熊', emoji: '🐻' },
                    { en: 'Duck', zh: '鸭子', emoji: '🦆' },
                    { en: 'Pig', zh: '猪', emoji: '🐷' }

            },
            clothes: {
                name: '衣服类',

        const PROGRESS_VERSION = 2;

        function loadProgress() {
            try {
                const savedVersion = localStorage.getItem('progressVersion');
                const saved = localStorage.getItem('englishLearningProgress');
                
                if (saved && savedVersion === String(PROGRESS_VERSION)) {
                    learningProgress = JSON.parse(saved);
                } else {
                    console.log('重置学习进度（版本更新或首次使用）');
                    learningProgress = {};
                    localStorage.setItem('progressVersion', PROGRESS_VERSION);
                    saveProgress();
                }
            } catch (e) {
                learningProgress = {};
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('englishLearningProgress', JSON.stringify(learningProgress));
            } catch (e) {
                console.error('保存进度失败:', e);
            }
        }

        function checkSpeechSupport() {
            if ('speechSynthesis' in window) {
                speechSynthReady = true;
                speechSynthesis.onvoiceschanged = () => {
                    speechSynthReady = true;
                };
            } else {
                console.warn('浏览器不支持语音合成');
            }

            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.maxAlternatives = 3;

                recognition.onresult = (event) => {
                    console.log('=== 识别结果 ===');
                    for (let i = 0; i < event.results.length; i++) {
                        for (let j = 0; j < event.results[i].length; j++) {
                            console.log(`候选 ${j+1}:`, event.results[i][j].transcript, 
                                       '(置信度:', event.results[i][j].confidence.toFixed(2) + ')');
                        }
                    }
                    
                    const transcript = event.results[0][0].transcript.toLowerCase().trim();
                    console.log('使用的识别文字:', transcript);
                    checkAnswer(transcript);
                };

                recognition.onerror = (event) => {
                    console.error('❌ 语音识别错误:', event.error);
                    let errorMsg = '识别失败';
                    
                    switch(event.error) {
                        case 'not-allowed':
                            errorMsg = '❌ 麦克风权限被拒绝，请在浏览器设置中允许';
                            break;
                        case 'no-speech':
                            errorMsg = '没有听到声音，请大声一点';
                            break;
                        case 'audio-capture':
                            errorMsg = '无法访问麦克风';
                            break;
                        case 'network':
                            errorMsg = '网络错误，语音识别需要联网';
                            break;
                        case 'aborted':
                            errorMsg = '录音已中止';
                            break;
                        default:
                            errorMsg = '识别错误: ' + event.error;
                    }
                    
                    stopRecording();
                    showResult(false, errorMsg);
                };

                recognition.onend = () => {
                    console.log('录音结束');
                    stopRecording();
                };

                recognition.onstart = () => {
                    console.log('✅ 录音已开始，请说话...');
                };
                
                console.log('✅ 语音识别已初始化');
            } else {
                console.warn('❌ 浏览器不支持语音识别，请使用 Chrome/Edge 浏览器');
            }
        }

        // ==================== 游戏模式 ====================
        function startGame() {
            if (currentWords.length === 0) return;
            
            hideAllScreens();
            document.getElementById('gameScreen').classList.add('active');
            
            score = 0;
            combo = 0;
            maxCombo = 0;
            fallingItems = [];
            updateScoreDisplay();
            updateComboDisplay();
            
            const canvas = document.getElementById('gameCanvas');
            cartX = canvas.offsetWidth / 2 - 50;
            const cart = document.getElementById('cart');
            cart.style.left = cartX + 'px';
            
            const tip = document.getElementById('gameTip');
            tip.textContent = '准备好了吗？点击开始！';
            tip.classList.add('active');
            
            setTimeout(() => {
                tip.classList.remove('active');
                gameRunning = true;
                startGameLoop();
            }, 1500);
        }

        function startGameLoop() {
            let lastSpawnTime = 0;
            let lastFrameTime = performance.now();
            
            function loop(currentTime) {
                if (!gameRunning) return;
                
                const deltaTime = (currentTime - lastFrameTime) / 1000;
                lastFrameTime = currentTime;
                
                if (currentTime - lastSpawnTime > 2000) {
                    spawnFallingItem();
                    lastSpawnTime = currentTime;
                }
                
                updateFallingItems(deltaTime);
                checkCollisions();
                gameLoop = requestAnimationFrame(loop);
            }
            
            gameLoop = requestAnimationFrame(loop);
        }

        function spawnFallingItem() {
            const canvas = document.getElementById('gameCanvas');
            const word = currentWords[Math.floor(Math.random() * currentWords.length)];
            
            const item = document.createElement('div');
            item.className = 'falling-item';
            item.style.left = (Math.random() * (canvas.offsetWidth - 70)) + 'px';
            item.style.top = '-70px';
            item.innerHTML = `
                <div class="falling-emoji">${word.emoji}</div>
                <div class="falling-word">${word.en}</div>
            `;
            
            canvas.appendChild(item);
            
            fallingItems.push({
                element: item,
                word: word,
                x: parseFloat(item.style.left),
                y: -70,
                speed: 100 + Math.random() * 50
            });
        }

        function updateFallingItems(deltaTime) {
            const canvas = document.getElementById('gameCanvas');
            
            fallingItems = fallingItems.filter(item => {
                item.y += item.speed * deltaTime;
                item.element.style.top = item.y + 'px';
                
                if (item.y > canvas.offsetHeight) {
                    item.element.remove();
                    combo = 0;
                    updateComboDisplay();
                    return false;
                }
                return true;
            });
        }

        function checkCollisions() {
            const canvas = document.getElementById('gameCanvas');
            const cartTop = canvas.offsetHeight - 100;
            const cartLeft = cartX;
            const cartRight = cartX + 100;
            
            fallingItems = fallingItems.filter(item => {
                if (item.y + 70 >= cartTop && item.y <= cartTop + 80) {
                    if (item.x + 70 >= cartLeft && item.x <= cartRight) {
                        catchItem(item);
                        return false;
                    }
                }
                return true;
            });
        }

        function catchItem(item) {
            addScore();
            showCatchEffect(item);
            speakWord(item.word, 2);
            item.element.remove();
        }

        function addScore() {
            combo++;
            if (combo > maxCombo) maxCombo = combo;
            
            let points = 1;
            if (combo >= 10) points = 10;
            else if (combo >= 3) points = 3;
            
            score += points;
            updateScoreDisplay();
            updateComboDisplay();
            
            if (combo >= 3) {
                showComboEffect();
            }
        }

        function showCatchEffect(item) {
            const canvas = document.getElementById('gameCanvas');
            const effect = document.createElement('div');
            effect.className = 'catch-effect';
            effect.textContent = '+' + (combo >= 10 ? 10 : combo >= 3 ? 3 : 1);
            effect.style.left = item.x + 'px';
            effect.style.top = item.y + 'px';
            canvas.appendChild(effect);
            
            setTimeout(() => effect.remove(), 500);
        }

        function showComboEffect() {
            const canvas = document.getElementById('gameCanvas');
            const effect = document.createElement('div');
            effect.className = 'combo-effect';
            effect.textContent = combo + ' 连击!';
            effect.style.left = '50%';
            effect.style.top = '40%';
            effect.style.transform = 'translateX(-50%)';
            canvas.appendChild(effect);
            
            setTimeout(() => effect.remove(), 1000);
        }

        function updateScoreDisplay() {
            document.getElementById('score').textContent = score;
        }

        function updateComboDisplay() {
            document.getElementById('combo').textContent = combo;
        }

        function setupControls() {
            const leftBtn = document.getElementById('leftBtn');
            const rightBtn = document.getElementById('rightBtn');
            const canvas = document.getElementById('gameCanvas');
            
            let moveInterval = null;
            let moveDirection = 0;
            
            function startMoving(direction) {
                if (!gameRunning) return;
                moveDirection = direction;
                moveInterval = setInterval(() => {
                    moveCart(moveDirection * 15);
                }, 30);
            }
            
            function stopMoving() {
                moveDirection = 0;
                if (moveInterval) {
                    clearInterval(moveInterval);
                    moveInterval = null;
                }
            }
            
            leftBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                startMoving(-1);
            });
            leftBtn.addEventListener('touchend', stopMoving);
            leftBtn.addEventListener('mousedown', () => startMoving(-1));
            leftBtn.addEventListener('mouseup', stopMoving);
            leftBtn.addEventListener('mouseleave', stopMoving);
            
            rightBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                startMoving(1);
            });
            rightBtn.addEventListener('touchend', stopMoving);
            rightBtn.addEventListener('mousedown', () => startMoving(1));
            rightBtn.addEventListener('mouseup', stopMoving);
            rightBtn.addEventListener('mouseleave', stopMoving);
            
            document.addEventListener('keydown', (e) => {
                if (!gameRunning) return;
                if (e.key === 'ArrowLeft') moveCart(-15);
                if (e.key === 'ArrowRight') moveCart(15);
            });
            
            let touchStartX = 0;
            canvas.addEventListener('touchstart', (e) => {
                if (!gameRunning) return;
                touchStartX = e.touches[0].clientX;
            });
            
            canvas.addEventListener('touchmove', (e) => {
                if (!gameRunning) return;
                e.preventDefault();
                const touchX = e.touches[0].clientX;
                const diff = touchX - touchStartX;
                if (Math.abs(diff) > 10) {
                    moveCart(diff * 0.5);
                    touchStartX = touchX;
                }
            });
        }

        function moveCart(delta) {
            const canvas = document.getElementById('gameCanvas');
            const cart = document.getElementById('cart');
            
            cartX += delta;
            cartX = Math.max(0, Math.min(canvas.offsetWidth - 100, cartX));
            cart.style.left = cartX + 'px';
        }

        function stopGame() {
            gameRunning = false;
            if (gameLoop) {
                cancelAnimationFrame(gameLoop);
                gameLoop = null;
            }
            
            fallingItems.forEach(item => item.element.remove());
            fallingItems = [];
            clearSpeechQueue();
        }

            if (currentWords.length === 0) return;

            document.getElementById('learnScreen').classList.add('active');
            
            updateLearnCard();

            speakWord(currentWords[currentWordIndex], 1);

        function updateLearnCard() {
            const word = currentWords[currentWordIndex];
            document.getElementById('learnEmoji').textContent = word.emoji;
            document.getElementById('learnEn').textContent = word.en;
            document.getElementById('learnZh').textContent = word.zh;
            document.getElementById('cardIndicator').textContent = 
                `${currentWordIndex + 1} / ${currentWords.length}`;
        }

        function updateLearnNavigation() {
            document.getElementById('prevBtn').disabled = currentWordIndex === 0;
            document.getElementById('nextBtn').disabled = currentWordIndex === currentWords.length - 1;
        }

        function prevWord() {
            if (currentWordIndex > 0) {
                currentWordIndex--;
                updateLearnCard();
                updateLearnNavigation();
                speakWord(currentWords[currentWordIndex], 1);
            }
        }

        function nextWord() {
            if (currentWordIndex < currentWords.length - 1) {
                currentWordIndex++;
                updateLearnCard();
                updateLearnNavigation();
                speakWord(currentWords[currentWordIndex], 1);
            }
        }

        function speakCurrentWord() {
            speakWord(currentWords[currentWordIndex], 2);
        }

        // ==================== 考试模式 ====================
        let examInProgress = false;

        function startExam() {
            if (currentWords.length === 0) return;
            
            if (!recognition) {
                alert('❌ 您的浏览器不支持语音识别功能！\n\n请使用 Chrome 或 Edge 浏览器。\nSafari 在 iOS 14.5+ 也支持。');
                return;
            }
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('❌ 无法访问麦克风！\n\n请确保：\n1. 使用 HTTPS 或 localhost\n2. 允许浏览器访问麦克风\n3. 设备已连接麦克风');
                return;
            }
            
            console.log('🎯 开始考试模式');
            
            currentWordIndex = 0;
            shuffleArray(currentWords);
            examInProgress = true;
            
            hideAllScreens();
            document.getElementById('examScreen').classList.add('active');
            
            updateExamCard();
            startExamTimer();
        }

        function updateExamCard() {
            const word = currentWords[currentWordIndex];
            document.getElementById('examEmoji').textContent = word.emoji;
            document.getElementById('examStatus').textContent = '点击 🎤 开始录音';
            document.getElementById('resultDisplay').textContent = '';
            document.getElementById('resultDisplay').className = 'result-display';
            document.getElementById('examIndicator').textContent = 
                `${currentWordIndex + 1} / ${currentWords.length}`;
            document.getElementById('recordBtn').disabled = false;
            examSeconds = 5;
            updateExamTimerDisplay();
        }

        function startExamTimer() {
            clearInterval(examTimer);
            examSeconds = 5;
            updateExamTimerDisplay();
            
            examTimer = setInterval(() => {
                examSeconds--;
                updateExamTimerDisplay();
                
                if (examSeconds <= 0) {
                    clearInterval(examTimer);
                    timeUp();
                }
            }, 1000);
        }

        function updateExamTimerDisplay() {
            document.getElementById('examTimer').textContent = examSeconds;
        }

        function timeUp() {
            if (!examInProgress) return;
            
            document.getElementById('examStatus').textContent = '⏰ 时间到！';
            document.getElementById('recordBtn').disabled = true;
            showResult(false, `正确答案: ${currentWords[currentWordIndex].en}`);
            
            setTimeout(() => {
                nextExamWord();
            }, 2500);
        }

        function toggleRecording() {
            if (isRecording) {
                console.log('手动停止录音');
                stopRecording();
            } else {
                startRecording();
            }
        }

        let recordTimeout = null;

        function startRecording() {
            if (!recognition || isRecording || !examInProgress) return;
            
            console.log('🎤 === 开始录音流程 ===');
            clearInterval(examTimer);
            
            try {
                isRecording = true;
                document.getElementById('recordBtn').classList.add('recording');
                document.getElementById('examStatus').textContent = '🎤 正在听你说...';
                
                recognition.start();
                console.log('recognition.start() 已调用');
                
                recordTimeout = setTimeout(() => {
                    console.log('录音超时（4秒），自动停止');
                    if (isRecording) {
                        try {
                            recognition.stop();
                        } catch (e) {}
                    }
                }, 4000);
                
            } catch (e) {
                console.error('❌ 启动录音异常:', e);
                isRecording = false;
                document.getElementById('recordBtn').classList.remove('recording');
                document.getElementById('examStatus').textContent = '启动失败，请重试';
                
                if (e.message && e.message.includes('not-allowed')) {
                    alert('❌ 麦克风权限被拒绝！\n\n请点击浏览器地址栏左侧的 🔒 或 ⓘ 图标，\n找到"麦克风"权限，选择"允许"，然后刷新页面。');
                }
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            
            isRecording = false;
            document.getElementById('recordBtn').classList.remove('recording');
            
            if (recordTimeout) {
                clearTimeout(recordTimeout);
                recordTimeout = null;
            }
            
            try {
                recognition.stop();
                console.log('recognition.stop() 已调用');
            } catch (e) {
                console.log('停止录音时的异常（可能是正常的）:', e.message || e);
            }
        }

        function checkAnswer(transcript) {
            if (!examInProgress) return;
            
            const correctAnswer = currentWords[currentWordIndex].en.toLowerCase();
            const userAnswer = transcript.toLowerCase().trim();
            
            console.log('\n📝 === 答案对比 ===');
            console.log('用户回答:', '"' + userAnswer + '"');
            console.log('正确答案:', '"' + correctAnswer + '"');
            
            const userWords = userAnswer.split(/\s+/).filter(w => w.length > 0);
            const correctWords = correctAnswer.split(/\s+/).filter(w => w.length > 0);
            
            console.log('用户分词:', userWords);
            console.log('正确分词:', correctWords);
            
            let isCorrect = false;
            
            if (userWords.length === 1 && correctWords.length === 1) {
                isCorrect = userWords[0] === correctWords[0] ||
                           similarity(userWords[0], correctWords[0]) > 0.65;
            } else {
                let matchCount = 0;
                correctWords.forEach(cw => {
                    if (userWords.some(uw => 
                        uw === cw || similarity(uw, cw) > 0.65
                    )) {
                        matchCount++;
                    }
                });
                isCorrect = matchCount === correctWords.length;
            }
            
            console.log('✅ 判断结果:', isCorrect ? '正确 ✅' : '错误 ❌');
            
            if (isCorrect) {
                showResult(true, '太棒了！✅');
                markWordLearned(currentWords[currentWordIndex].en);
            } else {
                showResult(false, `正确答案: ${currentWords[currentWordIndex].en}`);
            }
            
            speakWord(currentWords[currentWordIndex], 1);
            
            setTimeout(() => {
                nextExamWord();
            }, 2500);
        }

        function similarity(s1, s2) {
            if (!s1 || !s2) return 0;
            if (s1 === s2) return 1;
            
            const longer = s1.length > s2.length ? s1 : s2;
            const shorter = s1.length > s2.length ? s2 : s1;
            
            const costs = [];
            for (let i = 0; i <= shorter.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= longer.length; j++) {
                    if (i === 0) {
                        costs[j] = j;
                    } else if (j > 0) {
                        let newValue = costs[j - 1];
                        if (shorter.charAt(i - 1) !== longer.charAt(j - 1)) {
                            newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                        }
                        costs[j - 1] = lastValue;
                        lastValue = newValue;
                    }
                }
                if (i > 0) costs[longer.length] = lastValue;
            }
            
            const sim = (longer.length - costs[longer.length]) / parseFloat(longer.length);
            console.log(`  相似度: "${s1}" vs "${s2}" = ${sim.toFixed(2)}`);
            return sim;
        }

        function showResult(correct, message) {
            const result = document.getElementById('resultDisplay');
            result.textContent = message;
            result.className = 'result-display ' + (correct ? 'correct' : 'wrong');
            document.getElementById('recordBtn').disabled = true;
            
            if (correct) {
                document.getElementById('examStatus').textContent = '🎉 回答正确！';
            } else {
                document.getElementById('examStatus').textContent = '😊 再试试看！';
            }
        }

        function nextExamWord() {
            if (!examInProgress) return;
            
            clearInterval(examTimer);
            
            if (currentWordIndex < currentWords.length - 1) {
                currentWordIndex++;
                updateExamCard();
                startExamTimer();
            } else {
                examInProgress = false;
                alert('🎉 考试完成！继续加油！');
                backToCategory();
            }
        }

        function stopExam() {
            examInProgress = false;
            clearInterval(examTimer);
            stopRecording();
            clearSpeechQueue();
        }

        // ==================== 语音合成 ====================
        function speakDirect(word, lang) {
            return new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = lang;
                utterance.rate = 0.9;
                utterance.pitch = 1.1;
                utterance.volume = 1;
                utterance.onend = () => {
                    resolve();
                };
                utterance.onerror = (e) => {
                    console.error('发音错误:', e);
                    resolve();
                };
                try {
                    speechSynthesis.speak(utterance);
                } catch (e) {
                    console.error('发音异常:', e);
                    resolve();
                }
            });
        }

        async function speakWord(word, times = 1) {
            if (!('speechSynthesis' in window)) {
                console.warn('浏览器不支持语音合成');
                return;
            }
            
            try {
                speechSynthesis.cancel();
                
                for (let i = 0; i < times; i++) {
                    await speakDirect(word.en, 'en-US');
                    await new Promise(r => setTimeout(r, 200));
                    await speakDirect(word.zh, 'zh-CN');
                    if (i < times - 1) {
                        await new Promise(r => setTimeout(r, 400));
                    }
                }
            } catch (e) {
                console.error('发音失败:', e);
            }
        }

        function clearSpeechQueue() {
            try {
                speechSynthesis.cancel();
            } catch (e) {}
        }

        // ==================== 学习进度 ====================
        function markWordLearned(wordEn) {
            if (!learningProgress[currentCategory]) {
                learningProgress[currentCategory] = {};
            }
            
            if (!learningProgress[currentCategory][wordEn]) {
                learningProgress[currentCategory][wordEn] = 0;
            }
            
            learningProgress[currentCategory][wordEn]++;
            saveProgress();
        }

        function getCategoryProgress(categoryKey) {
            const words = wordDatabase[categoryKey]?.words || [];
            const progress = learningProgress[categoryKey] || {};
            
            let learned = 0;
            let learning = 0;
            
            words.forEach(word => {
                const count = progress[word.en] || 0;
                if (count >= 3) learned++;
                else if (count > 0) learning++;
            });
            
            return {
                total: words.length,
                learned,
                learning,
                notLearned: words.length - learned - learning
            };
        }

        function showProgress() {
            hideAllScreens();
            document.getElementById('progressScreen').classList.add('active');
            renderProgress();
        }

        function renderProgress() {
            const container = document.getElementById('progressContainer');
            
            let totalWords = 0;
            let totalLearned = 0;
            let totalLearning = 0;
            
            Object.keys(wordDatabase).forEach(key => {
                const progress = getCategoryProgress(key);
                totalWords += progress.total;
                totalLearned += progress.learned;
                totalLearning += progress.learning;
            });
            
            const percent = totalWords > 0 ? Math.round((totalLearned / totalWords) * 100) : 0;
            
            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number">${totalWords}</div>
                        <div class="stat-label">总单词数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${totalLearned}</div>
                        <div class="stat-label">考试通过</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${totalLearning}</div>
                        <div class="stat-label">正在学习</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${percent}%</div>
                        <div class="stat-label">完成度</div>
                    </div>
                </div>
                
                <div class="progress-card">
                    <div class="progress-title">总体进度（考试通过才算掌握）</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${percent}%;"></div>
                    </div>
                    <div class="progress-numbers">${totalLearned} / ${totalWords} 个单词考试通过</div>
                </div>
            `;
            
            Object.keys(wordDatabase).forEach(key => {
                const category = wordDatabase[key];
                const progress = getCategoryProgress(key);
                const percent = progress.total > 0 ? Math.round((progress.learned / progress.total) * 100) : 0;
                
                const learnedWords = category.words.filter(w => (learningProgress[key]?.[w.en] || 0) >= 3);
                const learningWords = category.words.filter(w => {
                    const count = learningProgress[key]?.[w.en] || 0;
                    return count > 0 && count < 3;
                });
                
                html += `
                    <div class="progress-card">
                        <div class="progress-title">${category.icon} ${category.name}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percent}%;"></div>
                        </div>
                        <div class="progress-numbers">考试通过 ${progress.learned}/${progress.total}</div>
                        ${learnedWords.length > 0 ? `
                            <div style="margin-top: 10px; font-size: 0.9em; color: #43e97b;">✅ 考试通过 (≥3次):</div>
                            <div class="word-list">
                                ${learnedWords.map(w => `<span class="word-tag learned">${w.en} ${w.emoji}</span>`).join('')}
                            </div>
                        ` : ''}
                        ${learningWords.length > 0 ? `
                            <div style="margin-top: 10px; font-size: 0.9em; color: #856404;">📖 考试答对过 (<3次):</div>
                            <div class="word-list">
                                ${learningWords.map(w => `<span class="word-tag learning">${w.en} ${w.emoji}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // ==================== 工具函数 ====================
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 60秒后游戏自动结束
        setInterval(() => {
            if (gameRunning && score > 0) {
            }
        }, 1000);

        // 120秒后自动结束游戏（可手动提前结束）
        let gameTime = 0;
        setInterval(() => {
            if (gameRunning) {
                gameTime++;
                if (gameTime >= 120) {
                    gameTime = 0;
                    showGameOver();
                }
            } else {
                gameTime = 0;
            }
        }, 1000);
    </script>
